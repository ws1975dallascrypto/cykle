services:

  # ── MySQL 8 ───────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cykle
      MYSQL_USER: cykle
      MYSQL_PASSWORD: cykle_local
      MYSQL_ROOT_PASSWORD: cykle_root_local
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "cykle", "-pcykle_local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API (Express + Prisma) ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: mysql://cykle:cykle_local@mysql:3306/cykle
      PORT: "4000"
      NODE_ENV: development

      # JWT — change these in production!
      JWT_ACCESS_SECRET: local-dev-access-secret-cykle-2024
      JWT_REFRESH_SECRET: local-dev-refresh-secret-cykle-2024
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d

      # Philippine locale
      TIMEZONE: Asia/Manila
      LOCALE: en-PH
      CURRENCY: PHP

      # CORS — allow the web container
      CORS_ORIGIN: http://localhost:3000

      # Optional — leave blank, features degrade gracefully
      PAYMONGO_SECRET_KEY: ""
      TWILIO_ACCOUNT_SID: ""
      CLOUDINARY_CLOUD_NAME: ""
    depends_on:
      mysql:
        condition: service_healthy

  # ── Web (Next.js) ─────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Browser reaches the API through the host, not the Docker network
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  mysql_data:
