name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.0.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Quality gate ─────────────────────────────────────────────────────────
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (shared)
        run: pnpm --filter @cykle/shared type-check

      - name: Type-check (api)
        run: pnpm --filter @cykle/api type-check

      - name: Type-check (web)
        run: pnpm --filter @cykle/web type-check

  # ── 2. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @cykle/api build

      - name: Build Web
        run: pnpm --filter @cykle/web build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            apps/api/dist
            apps/web/.next
          retention-days: 1

  # ── 3. Deploy to Hostinger VPS ──────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          debug: true
          script: |
            echo "✅ SSH connection OK"
            echo "User: $(whoami)"
            echo "Home: $HOME"
            id

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          debug: true
          script: |
            set -e
            SUDO=""
            [ "$(id -u)" != "0" ] && SUDO="sudo"

            # ── Bootstrap (idempotent) ────────────────────────────────────────
            echo "==> Checking Node.js..."
            if ! command -v node &>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | $SUDO bash -
              $SUDO apt-get install -y nodejs
            fi

            echo "==> Checking pnpm..."
            command -v pnpm &>/dev/null || $SUDO npm install -g pnpm@9.0.0

            echo "==> Checking PM2..."
            if ! command -v pm2 &>/dev/null; then
              $SUDO npm install -g pm2
              $SUDO pm2 startup systemd -u $(whoami) --hp $HOME | tail -1 | bash
            fi

            echo "==> Checking Nginx..."
            if ! command -v nginx &>/dev/null; then
              $SUDO apt-get install -y nginx
              $SUDO systemctl enable nginx
            fi

            # ── Nginx config ──────────────────────────────────────────────────
            $SUDO tee /etc/nginx/sites-available/cykle > /dev/null <<'NGINX'
            server {
                listen 80;
                server_name orangered-peafowl-333460.hostingersite.com;
                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_cache_bypass $http_upgrade;
                }
                location /api {
                    proxy_pass http://localhost:4000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
            }
            NGINX
            $SUDO ln -sf /etc/nginx/sites-available/cykle /etc/nginx/sites-enabled/cykle
            $SUDO nginx -t && $SUDO systemctl reload nginx

            # ── App directory ─────────────────────────────────────────────────
            APP=${{ secrets.HOSTINGER_APP_PATH }}
            $SUDO mkdir -p "$APP"
            $SUDO chown -R $(whoami):$(whoami) "$APP"
            if [ -d "$APP/.git" ]; then
              git -C "$APP" fetch origin main
              git -C "$APP" reset --hard origin/main
            else
              git clone https://github.com/ws1975dallascrypto/cykle "$APP"
            fi
            cd "$APP"

            # ── .env ──────────────────────────────────────────────────────────
            mkdir -p apps/api
            cat > apps/api/.env <<'ENV'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            PORT=4000
            NODE_ENV=production
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_ACCESS_EXPIRY=15m
            JWT_REFRESH_EXPIRY=7d
            TIMEZONE=Asia/Manila
            LOCALE=en-PH
            CURRENCY=PHP
            CORS_ORIGIN=http://orangered-peafowl-333460.hostingersite.com
            ENV

            # ── Dependencies + DB ─────────────────────────────────────────────
            echo "==> Installing dependencies..."
            pnpm install --frozen-lockfile --prod

            echo "==> Syncing database schema..."
            pnpm --filter @cykle/api exec prisma db push --accept-data-loss

            echo "==> Seeding demo data (first run only)..."
            pnpm --filter @cykle/api db:seed || true

            # ── Copy pre-built artifacts from GitHub Actions ──────────────────
            echo "==> Copying build artifacts..."
            cp -r /tmp/cykle-dist/apps/api/dist apps/api/dist 2>/dev/null || true
            cp -r /tmp/cykle-dist/apps/web/.next apps/web/.next 2>/dev/null || true

            echo "==> Starting services..."
            pm2 restart cykle-api --update-env 2>/dev/null || \
              pm2 start "$APP/apps/api/dist/index.js" --name cykle-api
            pm2 restart cykle-web --update-env 2>/dev/null || \
              pm2 start "pnpm --filter @cykle/web start" --name cykle-web --cwd "$APP"
            pm2 save

            echo "✅  Deploy complete → http://orangered-peafowl-333460.hostingersite.com"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to Hostinger failed. Check logs above."
